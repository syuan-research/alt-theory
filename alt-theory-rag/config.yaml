# Alt Theory RAG — User-editable configuration
# See alt-theory-rag-design.md for full documentation

embedding:
  provider: fastembed
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  dimension: 384

reranker:
  provider: fastembed
  model: BAAI/bge-reranker-base
  enabled: true

chunking:
  separators:
    - "^##\\s+"
  child_max_size: 800
  child_overlap: 100

metadata:
  fields:
    - name: theory
      required: true
      aliases: [theoryname]
    - name: author
      required: true
    - name: year
      type: int
    - name: type
    - name: title
    - name: topics
      type: list
    - name: environment
      type: list
    - name: population
      type: list
  auto:
    - section_header
    - section_type
    - doc_pair
  fallback:
    source: filename

search:
  default_top_k: 3
  max_top_k: 20
  hybrid_alpha: 0.7

domain:
  active: env-psychology
  documents_path: documents

query_expansions: {}

keyword_routes: {}
