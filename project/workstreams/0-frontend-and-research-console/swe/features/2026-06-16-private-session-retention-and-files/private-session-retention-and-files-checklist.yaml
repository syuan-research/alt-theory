feature: 2026-06-16-private-session-retention-and-files
created: 2026-06-16

steps:
  - action: "Retention helpers: calculate due time, refresh private activity, and hard-delete expired private sessions with tombstone"
    exit_signal: "Unit tests cover due-date calculation, idempotent cleanup, private deletion, and public-session non-deletion"
    status: done
  - action: "Visibility protocol and creation: WebSocket draft private selection creates private owned sessions"
    exit_signal: "WebSocket test creates private participant session with privateOverride and retentionDueAt"
    status: done
  - action: "Activity refresh: meaningful prompt activity updates private lastActivityAt and retentionDueAt"
    exit_signal: "Service/WebSocket test proves prompt refreshes private retention while open/detail does not"
    status: done
  - action: "Private access filtering: owner can access private detail/files; researcher/admin normal routes cannot read private content"
    exit_signal: "Backend tests cover owner access and researcher/admin private-content rejection"
    status: done
  - action: "Participant workspace file download/delete: add constrained download/delete routes with owner filtering"
    exit_signal: "Backend tests cover download, delete, path traversal rejection, and workspace-only participant deletion"
    status: done

checks:
  - item: "Private participant session records visibility=private, privateOverride=true, and retentionDueAt=lastActivityAt+7 days"
    source: design
    status: passed
  - item: "Meaningful prompt refreshes private lastActivityAt and retentionDueAt"
    source: design
    status: passed
  - item: "open_session/detail read does not refresh private activity"
    source: design
    status: passed
  - item: "Participant owner can read own private detail and workspace files"
    source: design
    status: passed
  - item: "Researcher/admin normal routes cannot read private transcript/workspace content"
    source: design
    status: passed
  - item: "Cleanup hard-deletes expired private history/workspace evidence and leaves minimal tombstone"
    source: design
    status: passed
  - item: "Cleanup does not delete public/research sessions"
    source: design
    status: passed
  - item: "Participant can download and delete own workspace text files; traversal is rejected"
    source: design
    status: passed
  - item: "No encryption claim, background scheduler, participant shell UI, public-session retention, or broad file manager"
    source: design
    status: passed
