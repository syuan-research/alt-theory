feature: 2026-06-16-pilot-auth-and-ownership-foundation
created: 2026-06-16

steps:
  - action: "Auth store skeleton: add data-dir account loading, code hashing/verification, and safe account serialization"
    exit_signal: "Unit tests cover valid, disabled, missing, and wrong-code accounts"
    status: done
  - action: "Auth routes and cookie identity: add login/logout/me plus request auth resolver"
    exit_signal: "Backend route tests cover cookie round trip and no secret leakage"
    status: done
  - action: "Session ownership persistence: extend v0.4 session header and create-session input"
    exit_signal: "Service test creates an owned session with roleCondition and consent snapshot"
    status: done
  - action: "Auth-aware REST catalog/detail: filter participant access and preserve researcher/admin access"
    exit_signal: "Backend tests prove participant sees own sessions only and cannot read others"
    status: done
  - action: "WebSocket ownership: resolve auth context on connection and apply role-condition defaults at first send"
    exit_signal: "WebSocket test first-send creates an owned role-conditioned session"
    status: done

checks:
  - item: "Valid participant code logs in and /api/auth/me returns safe identity"
    source: design
    status: done
  - item: "Wrong code returns a generic unauthorized response"
    source: design
    status: done
  - item: "Disabled account cannot log in"
    source: design
    status: done
  - item: "Participant-created session records ownerAccountId, roleCondition, and consent snapshot"
    source: design
    status: done
  - item: "Participant catalog/detail cannot expose another participant's session content"
    source: design
    status: done
  - item: "Researcher/admin can still access ownerless researcher workbench sessions"
    source: design
    status: done
  - item: "Participant WebSocket draft applies account role-condition default"
    source: design
    status: done
  - item: "No self-registration, private retention, project-condition dependency, role-preset authoring, or global admin UI"
    source: design
    status: done
