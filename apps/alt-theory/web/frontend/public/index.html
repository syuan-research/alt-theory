<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alt Theory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Alt Theory</h1>
      <button id="new-session-btn" title="New session">+ New</button>
    </div>

    <div id="session-info">
      <div id="session-id" class="muted">No session</div>
      <div id="session-status" class="muted"></div>
    </div>

    <div id="settings">
      <label for="kb-select">Knowledge Base</label>
      <select id="kb-select">
        <option value="ep-core">EP Core</option>
        <option value="urban">Urban</option>
        <option value="all">All Domains</option>
      </select>

      <label for="profile-select">Agent Profile</label>
      <select id="profile-select">
        <option value="./agent-assets/profiles/default.md">Default</option>
      </select>
      <p class="hint">Agent profile changes take effect on next new session.</p>
    </div>
  </div>

  <div id="main">
    <div id="messages"></div>
    <div id="composer">
      <div id="tool-status"></div>
      <div id="input-row">
        <input type="text" id="input" placeholder="Ask Alt Theory..." autocomplete="off">
        <button id="send">Send</button>
        <button id="stop" style="display:none">Stop</button>
      </div>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
